<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Abbiatti</title>
    <meta name="description" content="Abbiatti — Host &amp; Co-Host App" />
    <meta name="author" content="Abbiatti" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Abbiatti" />
    <meta property="og:description" content="Abbiatti — Host &amp; Co-Host App" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/abbiatti-logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Abbiatti" />
    <meta name="twitter:image" content="/abbiatti-logo.png" />
    
    <link rel="icon" type="image/png" href="/abbiatti-logo.png" />

    <!-- Fonts: loaded non-blocking (preload + onload swap) instead of a
         render-blocking CSS @import. preconnect warms the TLS handshake; if
         fonts.googleapis.com is unreachable the page still paints with the
         local fallbacks declared in src/index.css. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      />
    </noscript>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
